version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: perechyn_hospital_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hospital_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hospital_pass}
      POSTGRES_DB: ${DB_NAME:-perechyn_hospital}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-hospital_user} -d ${DB_NAME:-perechyn_hospital}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: perechyn_hospital_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hospital.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
